<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German Grammar</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --panel-2: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; --border: #334155;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); }
  header { display: flex; justify-content: space-between; align-items: center; gap: 12px;
    padding: 14px 18px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 5; }
  header h1 { font-size: 1.1rem; margin: 0; display: flex; align-items: center; gap: 8px; }
  header h1 .logo { width: 26px; height: 26px; }
  header a { color: var(--accent); text-decoration: none; font-size: .9rem; border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; }

  .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 53px); }
  aside { border-right: 1px solid var(--border); padding: 14px; overflow-y: auto; }
  aside .group { font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 14px 6px 6px; }
  aside a { display: block; color: var(--text); text-decoration: none; padding: 9px 10px; border-radius: 8px; font-size: .92rem; cursor: pointer; }
  aside a:hover { background: var(--panel); }
  aside a.active { background: var(--panel-2); color: var(--accent); font-weight: 600; }

  main { padding: 24px 28px 60px; max-width: 820px; }
  .content h1 { font-size: 1.6rem; margin-top: 0; }
  .content h2 { font-size: 1.25rem; margin-top: 1.6em; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .content h3 { font-size: 1.05rem; margin-top: 1.3em; }
  .content p { line-height: 1.7; }
  .content ul, .content ol { line-height: 1.7; padding-left: 1.4em; }
  .content li { margin: 4px 0; }
  .content strong { color: #fff; }
  .content em { color: var(--accent); font-style: normal; }
  .content code { background: var(--panel); border: 1px solid var(--border); border-radius: 5px; padding: 1px 6px; font-size: .9em; }
  .content a { color: var(--accent); }
  .content blockquote { border-left: 3px solid var(--accent); margin: 1em 0; padding: 6px 14px; background: var(--panel); border-radius: 0 8px 8px 0; color: var(--muted); }
  .content hr { border: none; border-top: 1px solid var(--border); margin: 1.6em 0; }
  .content table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: .92rem; display: block; overflow-x: auto; }
  .content th, .content td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; }
  .content thead th { background: var(--panel-2); }
  .content tbody tr:nth-child(even) { background: var(--panel); }

  .muted { color: var(--muted); }
  @media (max-width: 720px) {
    .layout { grid-template-columns: 1fr; }
    aside { border-right: none; border-bottom: 1px solid var(--border); max-height: 38vh; }
    main { padding: 18px; }
  }
</style>
</head>
<body>
<header>
  <h1><img src="/favicon.svg" alt="" class="logo"> German Grammar</h1>
  <a href="/">← Back to flashcards</a>
</header>

<div class="layout">
  <aside id="sidebar"></aside>
  <main><div class="content" id="content"><p class="muted">Loading…</p></div></main>
</div>

<script>
const $ = (s) => document.querySelector(s);
const api = (url) => fetch(url).then(r => r.ok ? r.json() : Promise.reject(r));
let TOPICS = [];

function escapeHtml(s) {
  return (s ?? '').replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
}

// ---- minimal Markdown -> HTML (headings, tables, lists, quotes, hr, inline) ----
function inline(t) {
  t = escapeHtml(t);
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}
function splitRow(line) {
  let s = line.trim();
  if (s.startsWith('|')) s = s.slice(1);
  if (s.endsWith('|')) s = s.slice(0, -1);
  return s.split('|').map(c => c.trim());
}
const isTableSep = (s) => s && s.includes('-') && /^\s*\|?[\s:|-]+\|?\s*$/.test(s);
const startsBlock = (s) => /^\s*(#{1,6}\s|>|[-*]\s|\d+\.\s)/.test(s) || /^\s*([-*_])\1{2,}\s*$/.test(s);

function mdToHtml(md) {
  const lines = md.replace(/\r\n/g, '\n').split('\n');
  let html = '', i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (!line.trim()) { i++; continue; }

    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) { const l = h[1].length; html += `<h${l}>${inline(h[2].trim())}</h${l}>`; i++; continue; }

    if (/^\s*([-*_])\1{2,}\s*$/.test(line)) { html += '<hr>'; i++; continue; }

    if (/^\s*>\s?/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^\s*>\s?/, '')); i++; }
      html += `<blockquote>${inline(buf.join(' '))}</blockquote>`; continue;
    }

    if (line.includes('|') && isTableSep(lines[i + 1])) {
      const header = splitRow(line); i += 2;
      const rows = [];
      while (i < lines.length && lines[i].includes('|') && lines[i].trim()) { rows.push(splitRow(lines[i])); i++; }
      html += '<table><thead><tr>' + header.map(c => `<th>${inline(c)}</th>`).join('') + '</tr></thead><tbody>'
        + rows.map(r => '<tr>' + r.map(c => `<td>${inline(c)}</td>`).join('') + '</tr>').join('')
        + '</tbody></table>'; continue;
    }

    if (/^\s*[-*]\s+/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) { buf.push(lines[i].replace(/^\s*[-*]\s+/, '')); i++; }
      html += '<ul>' + buf.map(x => `<li>${inline(x)}</li>`).join('') + '</ul>'; continue;
    }
    if (/^\s*\d+\.\s+/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) { buf.push(lines[i].replace(/^\s*\d+\.\s+/, '')); i++; }
      html += '<ol>' + buf.map(x => `<li>${inline(x)}</li>`).join('') + '</ol>'; continue;
    }

    const buf = [];
    while (i < lines.length && lines[i].trim() && !startsBlock(lines[i])
           && !(lines[i].includes('|') && isTableSep(lines[i + 1]))) { buf.push(lines[i]); i++; }
    html += `<p>${inline(buf.join(' '))}</p>`;
  }
  return html;
}

// ---- sidebar + routing ----
function renderSidebar(activeSlug) {
  const groups = {};
  for (const t of TOPICS) (groups[t.category] ||= []).push(t);
  let html = '';
  for (const cat in groups) {
    html += `<div class="group">${escapeHtml(cat)}</div>`;
    html += groups[cat].map(t =>
      `<a data-slug="${t.slug}" class="${t.slug === activeSlug ? 'active' : ''}" href="#${t.slug}">${escapeHtml(t.title)}</a>`
    ).join('');
  }
  $('#sidebar').innerHTML = html;
}

async function showTopic(slug) {
  renderSidebar(slug);
  try {
    const topic = await api('/api/grammar/' + encodeURIComponent(slug));
    $('#content').innerHTML = mdToHtml(topic.body);
    window.scrollTo(0, 0);
  } catch {
    $('#content').innerHTML = '<p class="muted">Topic not found.</p>';
  }
}

function currentSlug() { return decodeURIComponent(location.hash.replace(/^#/, '')); }
window.addEventListener('hashchange', () => { const s = currentSlug(); if (s) showTopic(s); });

async function init() {
  TOPICS = await api('/api/grammar');
  if (!TOPICS.length) {
    $('#sidebar').innerHTML = '<p class="muted" style="padding:10px">No topics yet.</p>';
    $('#content').innerHTML = '<p class="muted">No grammar topics found.</p>';
    return;
  }
  const slug = currentSlug() && TOPICS.some(t => t.slug === currentSlug()) ? currentSlug() : TOPICS[0].slug;
  if (!location.hash) location.hash = slug;
  showTopic(slug);
}
init();
</script>
</body>
</html>
