<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="German flashcards logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- rounded app tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="#38bdf8" stroke-width="2"/>

  <!-- back card (peeking) -->
  <rect x="14" y="16" width="30" height="34" rx="4" fill="#334155" transform="rotate(-10 32 32)"/>

  <!-- front flashcard -->
  <g transform="rotate(7 32 32)">
    <rect x="20" y="14" width="30" height="36" rx="4" fill="#f8fafc"/>
    <!-- German flag stripes -->
    <rect x="24" y="19" width="22" height="4" rx="1" fill="#000000"/>
    <rect x="24" y="25" width="22" height="4" rx="1" fill="#dd0000"/>
    <rect x="24" y="31" width="22" height="4" rx="1" fill="#ffce00"/>
    <!-- text lines -->
    <rect x="24" y="39" width="22" height="3" rx="1.5" fill="#94a3b8"/>
    <rect x="24" y="44" width="14" height="3" rx="1.5" fill="#cbd5e1"/>
  </g>
</svg>
