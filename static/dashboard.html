<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard · German Flashcards</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --panel-2: #334155; --text: #e2e8f0;
    --muted: #94a3b8; --accent: #38bdf8; --good: #22c55e; --hard: #f59e0b;
    --bad: #ef4444; --border: #334155;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg); color: var(--text); }
  header { display: flex; align-items: center; gap: 12px; padding: 16px 22px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
  header img { width: 30px; height: 30px; }
  header h1 { font-size: 1.1rem; margin: 0; flex: 1; }
  header a { color: var(--accent); text-decoration: none; font-size: .85rem; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 20px 22px 60px; }
  h2 { font-size: 1rem; margin: 28px 0 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  h2:first-child { margin-top: 4px; }
  .dtabs { display: flex; gap: 4px; background: var(--panel); padding: 4px; border-radius: 11px; margin: 4px 0 18px; flex-wrap: wrap; position: sticky; top: 62px; z-index: 5; }
  .dtab { flex: 1; min-width: 88px; background: none; border: none; color: var(--muted); padding: 9px 8px; border-radius: 8px; cursor: pointer; font-size: .85rem; font-weight: 600; }
  .dtab.active { background: var(--bg); color: var(--text); box-shadow: 0 2px 6px rgba(0,0,0,.25); }
  .tab-panel { display: none; } .tab-panel.active { display: block; }
  .ctabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .ctab { background: var(--panel); border: 1px solid var(--border); color: var(--muted); padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: .85rem; font-weight: 600; }
  .ctab.active { background: var(--panel-2); color: var(--text); border-color: var(--accent); }
  .cpanel { display: none; } .cpanel.active { display: block; }
  .cform { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .cform h3 { margin: 0 0 12px; font-size: .95rem; }
  .cform input, .cform select, .cform textarea { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: .85rem; margin-bottom: 8px; font-family: inherit; }
  .cform .frow { display: flex; gap: 8px; } .cform .frow input, .cform .frow select { width: auto; flex: 1; }
  .cform button { background: var(--accent); color: #06121f; border: none; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-weight: 700; font-size: .82rem; }
  .cform button#cw-cancel, .cform button#cu-cancel, .cform button#cr-cancel { background: var(--panel-2); color: var(--text); }
  .csent { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: .8rem; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .cu-words { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; max-height: 220px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; padding: 8px; margin-bottom: 10px; }
  .cu-words .uw { display: flex; align-items: center; gap: 6px; font-size: .82rem; }
  .u-admin-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; font-size: .82rem; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .card .n { font-size: 1.7rem; font-weight: 800; }
  .card .l { font-size: .76rem; color: var(--muted); margin-top: 2px; }
  .card.good .n { color: var(--good); } .card.warn .n { color: var(--hard); } .card.bad .n { color: var(--bad); }
  table { width: 100%; border-collapse: collapse; font-size: .82rem; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  th, td { text-align: left; padding: 9px 11px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; font-size: .72rem; text-transform: uppercase; letter-spacing: .03em; }
  tr:last-child td { border-bottom: none; }
  .scroll { overflow-x: auto; }
  .pill { padding: 2px 8px; border-radius: 999px; font-size: .72rem; font-weight: 700; }
  .pill.generated { background: rgba(34,197,94,.18); color: var(--good); }
  .pill.cached { background: rgba(56,189,248,.18); color: var(--accent); }
  .pill.error { background: rgba(239,68,68,.18); color: var(--bad); }
  .tok { font-weight: 700; color: var(--accent); }
  .muted { color: var(--muted); }
  .gate { text-align: center; padding: 80px 20px; color: var(--muted); }
  .bar { height: 6px; background: var(--bg); border-radius: 999px; overflow: hidden; margin-top: 5px; min-width: 80px; }
  .bar > div { height: 100%; background: var(--good); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { background: var(--panel); border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px; font-size: .82rem; }
  .chip b { color: var(--accent); }
  .nowrap { white-space: nowrap; }
  .gr-amt { width: 56px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px; font-size: .8rem; }
  .gr-btn { background: var(--accent); color: #06121f; border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-weight: 700; font-size: .78rem; margin-left: 4px; }
  .gr-btn:disabled { opacity: .5; cursor: default; }
  .pager { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
  .pager button { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: .82rem; }
  .pager button:disabled { opacity: .4; cursor: default; }
  .pkg-form { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 12px; }
  .pkg-form input[type=number], .pkg-form input[type=text], .pkg-form input:not([type]) { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; font-size: .85rem; }
  .pkg-form input#pk-tokens, .pkg-form input#pk-price { width: 150px; }
  .pkg-form .ck { display: flex; align-items: center; gap: 5px; font-size: .82rem; color: var(--muted); }
  #pkg-save { background: var(--accent); color: #06121f; border: none; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-weight: 700; font-size: .82rem; }
  #pkg-cancel { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: .82rem; }
  .pk-edit, .pk-del { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 9px; cursor: pointer; font-size: .76rem; margin-left: 4px; }
  .pk-del { color: var(--bad); border-color: var(--bad); }
  .set-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; max-width: 560px; }
  .set-active { margin-bottom: 12px; font-size: .9rem; }
  .set-group { border-top: 1px solid var(--border); margin-top: 12px; padding-top: 12px; }
  .set-title { font-size: .8rem; color: var(--accent); font-weight: 700; margin-bottom: 8px; }
  .set-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .set-row label { font-size: .76rem; color: var(--muted); }
  .set-row input, .set-row select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: .85rem; }
  #set-save { background: var(--accent); color: #06121f; border: none; border-radius: 8px; padding: 9px 16px; cursor: pointer; font-weight: 700; font-size: .84rem; margin-top: 6px; }
</style>
</head>
<body>
<header>
  <img src="/favicon.svg" alt="">
  <h1>Admin Dashboard</h1>
  <a href="/">← Back to app</a>
</header>
<div class="wrap" id="wrap"><div class="gate">Loading…</div></div>

<script>
const $ = (s) => document.querySelector(s);
const esc = (s) => (s ?? '').toString().replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const fmtTime = (t) => t ? esc(t.replace('T', ' ').slice(0, 16)) : '';
function uaShort(ua) {
  if (!ua) return '—';
  const os = /Windows/.test(ua) ? 'Windows' : /iPhone|iPad/.test(ua) ? 'iOS' : /Android/.test(ua) ? 'Android'
    : /Mac OS X/.test(ua) ? 'macOS' : /Linux/.test(ua) ? 'Linux' : '';
  const br = /Edg\//.test(ua) ? 'Edge' : /OPR\//.test(ua) ? 'Opera' : /Chrome\//.test(ua) ? 'Chrome'
    : /Firefox\//.test(ua) ? 'Firefox' : /Safari\//.test(ua) ? 'Safari' : 'Browser';
  return esc([br, os].filter(Boolean).join(' · '));
}

async function load() {
  let d;
  try {
    const r = await fetch('/api/admin/dashboard');
    if (r.status === 401 || r.status === 403) { $('#wrap').innerHTML = '<div class="gate">🔒 Admins only. <a href="/" style="color:var(--accent)">Sign in as an admin</a>.</div>'; return; }
    d = await r.json();
    try { const sr = await fetch('/api/admin/settings'); SETTINGS = sr.ok ? await sr.json() : null; } catch { SETTINGS = null; }
  } catch { $('#wrap').innerHTML = '<div class="gate">Failed to load dashboard.</div>'; return; }
  userPage = 0;
  render(d);
}

function card(n, label, cls = '') { return `<div class="card ${cls}"><div class="n">${n}</div><div class="l">${label}</div></div>`; }

let SETTINGS = null;
let DATA = null;
let userPage = 0;
const PAGE = 20;

function render(d) {
  DATA = d;
  const s = d.summary;
  const cards = [
    card(s.users, 'Users'),
    card(s.tokens_remaining, 'Tokens remaining', 'good'),
    card(s.tokens_spent, 'Tokens spent (charges)'),
    card(s.generations, 'AI generations', 'good'),
    card(s.cached_hits, 'Cached hits'),
    card(s.errors, 'Errors', s.errors ? 'bad' : ''),
    card('€' + ((s.revenue_cents || 0) / 100).toFixed(2), 'Revenue', 'good'),
    card(s.purchases || 0, 'Purchases'),
    card(s.referrals || 0, 'Referrals'),
    card('🪙 ' + (s.referral_tokens_awarded || 0), 'Referral tokens'),
    card(s.words, 'Words'),
    card(s.ai_sentences + '/' + s.sentences, 'AI / total sentences'),
    card(s.readings, 'Readings'),
  ].join('');

  const careers = (d.careers || []).length
    ? d.careers.map(c => `<span class="chip">${esc(c.career)} <b>${c.users}</b></span>`).join('')
    : '<span class="muted">No careers set yet.</span>';

  const logRow = (l) => `<tr>
    <td class="muted">${fmtTime(l.created_at)}</td>
    <td>${esc(l.email || '—')}</td>
    <td><span class="pill ${esc(l.status)}">${esc(l.status)}</span></td>
    <td>${esc(l.word || (l.word_id ? '#' + l.word_id : '—'))}</td>
    <td>${esc(l.career || '—')}</td>
    <td class="muted">${esc(l.detail || '')}</td>
  </tr>`;
  const logs = d.recent_logs.map(logRow).join('') || '<tr><td colspan="6" class="muted">No API calls logged yet.</td></tr>';

  const errs = d.error_logs.map(l => `<tr>
    <td class="muted">${fmtTime(l.created_at)}</td>
    <td>${esc(l.email || '—')}</td>
    <td>${esc(l.career || '—')}</td>
    <td style="color:var(--bad)">${esc(l.detail || '')}</td>
  </tr>`).join('') || '<tr><td colspan="4" class="muted">No errors 🎉</td></tr>';

  $('#wrap').innerHTML = `
    <div class="dtabs">
      <button class="dtab" data-tab="overview">Overview</button>
      <button class="dtab" data-tab="users">Users</button>
      <button class="dtab" data-tab="content">Content</button>
      <button class="dtab" data-tab="sales">Tokens &amp; Sales</button>
      <button class="dtab" data-tab="ai">AI</button>
      <button class="dtab" data-tab="companies">🎯 Companies</button>
      <button class="dtab" data-tab="advertisements">📢 Ads</button>
      <button class="dtab" data-tab="tokens">🔑 API Tokens</button>
      <button class="dtab" data-tab="logs">Logs</button>
    </div>

    <div class="tab-panel" data-panel="content">
      <div class="ctabs">
        <button class="ctab active" data-ctab="words">Words</button>
        <button class="ctab" data-ctab="units">Units</button>
        <button class="ctab" data-ctab="readings">Readings</button>
      </div>
      <div class="cpanel active" data-cpanel="words" id="cwords"><div class="muted">Loading…</div></div>
      <div class="cpanel" data-cpanel="units" id="cunits"></div>
      <div class="cpanel" data-cpanel="readings" id="creadings"></div>
    </div>

    <div class="tab-panel" data-panel="overview">
      <h2>Overview</h2>
      <div class="cards">${cards}</div>
      <h2>Careers in use (${(d.careers || []).length})</h2>
      <div class="chips">${careers}</div>
    </div>

    <div class="tab-panel" data-panel="users">
      <h2>Users &amp; progress</h2>
      <div class="scroll"><table>
        <thead><tr><th>User</th><th>Career</th><th>Level</th><th>Tokens</th><th>Words units</th><th>Readings</th><th>Learned</th><th>AI charges</th><th>Last seen</th><th>Joined</th><th>Add tokens</th></tr></thead>
        <tbody id="users-body"></tbody>
      </table></div>
      <div class="pager" id="users-pager"></div>
    </div>

    <div class="tab-panel" data-panel="sales">
      <h2>Token packages (PayPal)</h2>
      <div class="scroll"><table>
        <thead><tr><th>Tokens</th><th>Price</th><th>Status</th><th>Order</th><th></th></tr></thead>
        <tbody id="pkg-body"></tbody>
      </table></div>
      <div class="pkg-form">
        <input id="pk-tokens" type="number" min="1" placeholder="Tokens (e.g. 200)">
        <input id="pk-price" type="number" min="0.5" step="0.01" placeholder="Price (e.g. 2.99)">
        <input id="pk-cur" value="EUR" maxlength="3" style="width:60px">
        <input id="pk-pos" type="number" value="0" title="Order" style="width:70px">
        <label class="ck"><input type="checkbox" id="pk-active" checked> Active</label>
        <button id="pkg-save">Add package</button>
        <button id="pkg-cancel" style="display:none">Cancel</button>
        <span id="pkg-status" class="muted"></span>
      </div>
      <h2>Recent purchases (${(d.recent_purchases || []).length})</h2>
      <div class="scroll"><table>
        <thead><tr><th>When</th><th>User</th><th>Tokens</th><th>Amount</th><th>Provider ref</th></tr></thead>
        <tbody>${(d.recent_purchases || []).map(p => `<tr>
          <td class="muted">${fmtTime(p.created_at)}</td><td>${esc(p.email || '—')}</td>
          <td>+${p.tokens}</td><td class="tok">${(p.price_cents/100).toFixed(2)} ${esc(p.currency)}</td>
          <td class="muted">${esc(p.provider_ref || '')}</td></tr>`).join('')
          || '<tr><td colspan="5" class="muted">No purchases yet.</td></tr>'}</tbody>
      </table></div>
    </div>

    <div class="tab-panel" data-panel="ai">
      <h2>AI provider &amp; API keys</h2>
      <div id="ai-settings"></div>
    </div>

    <div class="tab-panel" data-panel="companies">
      <div id="companies-content"><div class="gate">Loading companies...</div></div>
    </div>

    <div class="tab-panel" data-panel="advertisements">
      <div id="advertisements-content"><div class="gate">Loading advertisements...</div></div>
    </div>

    <div class="tab-panel" data-panel="tokens">
      <div id="tokens-content"><div class="gate">Loading tokens...</div></div>
    </div>

    <div class="tab-panel" data-panel="logs">
      <h2>Recent API calls (${d.recent_logs.length})</h2>
      <div class="scroll"><table>
        <thead><tr><th>When</th><th>User</th><th>Status</th><th>Word</th><th>Career</th><th>Detail</th></tr></thead>
        <tbody>${logs}</tbody>
      </table></div>
      <h2>Error log (${d.error_logs.length})</h2>
      <div class="scroll"><table>
        <thead><tr><th>When</th><th>User</th><th>Career</th><th>Error</th></tr></thead>
        <tbody>${errs}</tbody>
      </table></div>
      <h2>Access log — request headers (${(d.access_logs || []).length})</h2>
      <div class="scroll"><table>
        <thead><tr><th>When</th><th>User</th><th>Event</th><th>IP</th><th>Browser / device</th><th>Language</th><th>Referer</th></tr></thead>
        <tbody>${(d.access_logs || []).map(a => `<tr>
          <td class="muted">${fmtTime(a.created_at)}</td>
          <td>${esc(a.email || '—')}</td>
          <td><span class="pill cached">${esc(a.event || '')}</span></td>
          <td>${esc(a.ip || '—')}</td>
          <td title="${esc(a.user_agent || '')}">${uaShort(a.user_agent)}</td>
          <td class="muted">${esc((a.language || '—').split(',')[0])}</td>
          <td class="muted">${esc(a.referer || '—')}</td>
        </tr>`).join('') || '<tr><td colspan="7" class="muted">No access records yet.</td></tr>'}</tbody>
      </table></div>
    </div>`;
  document.querySelectorAll('.dtab').forEach(b => b.onclick = () => showTab(b.dataset.tab));
  renderUsers();
  renderPackages();
  renderSettings();
  showTab(currentTab);
}

let currentTab = 'overview';
function showTab(name) {
  currentTab = name;
  document.querySelectorAll('.dtab').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === name));
  if (name === 'content') loadContent();
  if (name === 'companies') loadCompanies();
  if (name === 'advertisements') loadAdvertisements();
  if (name === 'tokens') loadTokens();
  document.querySelectorAll('.ctab').forEach(b => b.onclick = () => showCtab(b.dataset.ctab));
}
function showCtab(name) {
  document.querySelectorAll('.ctab').forEach(b => b.classList.toggle('active', b.dataset.ctab === name));
  document.querySelectorAll('.cpanel').forEach(p => p.classList.toggle('active', p.dataset.cpanel === name));
}

// ===== Content management (words / units / readings) =====
let CWORDS = [], CUNITS = [], CREADINGS = [];
const LEVELS = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
let _contentLoaded = false;
async function loadContent(force) {
  if (_contentLoaded && !force) return;
  try {
    [CWORDS, CUNITS, CREADINGS] = await Promise.all([
      fetch('/api/words').then(r => r.json()),
      fetch('/api/units').then(r => r.json()),
      fetch('/api/readings').then(r => r.json()),
    ]);
    _contentLoaded = true;
  } catch { $('#cwords').innerHTML = '<div class="muted">Failed to load content.</div>'; return; }
  renderWordsAdmin(); renderUnitsAdmin(); renderReadingsAdmin();
}
const levelOptions = (sel) => LEVELS.map(l => `<option value="${l}"${l === sel ? ' selected' : ''}>${l}</option>`).join('');
function cstatus(id, msg, ok) { const e = $('#' + id); if (e) { e.style.color = ok ? 'var(--good)' : 'var(--bad)'; e.textContent = msg; } }

// ----- Words -----
let wEditId = null, wPage = 0;
function renderWordsAdmin() {
  $('#cwords').innerHTML = `
    <div class="cform">
      <h3 id="cw-title">Add word</h3>
      <div class="frow"><input id="cw-word" placeholder="German word (e.g. die Beratung)">
        <input id="cw-cat" value="general" placeholder="topic (e.g. kubernetes)" style="width:140px" title="Topic — admin label for browsing/filtering">
        <select id="cw-level">${levelOptions('B1')}</select></div>
      <div class="frow"><input id="cw-lemma" placeholder="Lemma(s)"><input id="cw-pos" placeholder="Part of speech (Adjektiv)">
        <input id="cw-article" placeholder="Article (der/die/das)" style="width:150px"></div>
      <input id="cw-url" placeholder="Audio URL (mp3) — e.g. https://www.dwds.de/audio/002/die_Beratung.mp3">
      <input id="cw-wordurl" placeholder="Word page URL — e.g. https://www.dwds.de/wb/abbiegen">
      <input id="cw-meanings" placeholder='Meanings — comma separated, e.g. deployment, provisioning, rollout' title="One or more English meanings for this word">
      <div id="cw-sents"></div>
      <textarea id="cw-newsents" rows="3" placeholder="Add sentences — one per line as:  German | English"></textarea>
      <div><button id="cw-save">Save word</button> <button id="cw-cancel" style="display:none">Cancel</button> <span id="cw-status" class="muted"></span></div>
    </div>
    <input id="cw-search" placeholder="Search words…" style="margin:14px 0 8px;width:100%">
    <div class="scroll"><table><thead><tr><th>Word</th><th>Level</th><th>POS</th><th>Audio</th><th>Sent.</th><th></th></tr></thead><tbody id="cw-body"></tbody></table></div>
    <div class="pager" id="cw-pager"></div>`;
  $('#cw-save').onclick = saveWord; $('#cw-cancel').onclick = resetWordForm;
  $('#cw-search').oninput = () => { wPage = 0; renderWordRows(); };
  renderWordRows();
}
function renderWordRows() {
  const q = ($('#cw-search')?.value || '').trim().toLowerCase();
  const all = q ? CWORDS.filter(w => (w.word || '').toLowerCase().includes(q)) : CWORDS;
  const pages = Math.max(1, Math.ceil(all.length / 20)); if (wPage >= pages) wPage = pages - 1;
  const slice = all.slice(wPage * 20, wPage * 20 + 20);
  $('#cw-body').innerHTML = slice.map(w => `<tr>
    <td><b>${esc(w.word)}</b>${w.lemma ? ` <span class="muted">${esc(w.lemma)}</span>` : ''}${(w.meanings||[]).length ? `<br><span class="muted" style="font-size:.72rem">${w.meanings.map(esc).join(' · ')}</span>` : ''}</td>

async function grant(email, btn) {
  const amt = parseInt(btn.previousElementSibling.value, 10);
  if (!amt || amt < 1) { alert('Enter a token amount.'); return; }
  btn.disabled = true;
  try {
    const r = await fetch('/api/tokens/grant', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, amount: amt }) });
    if (!r.ok) { alert('Failed to add tokens.'); btn.disabled = false; return; }
    const res = await r.json();
    const u = DATA.users.find(x => x.email === email);
    if (u) u.tokens = res.tokens;
    DATA.summary.tokens_remaining += amt;
    render(DATA);   // refresh totals + rows
  } catch { alert('Network error.'); btn.disabled = false; }
}

    const r = await fetch('/api/admin/advertisements');
    const data = await r.json();
    const pending = data.pending || [];
    const approved = data.approved || [];

    const adRow = (a, isPending) => `<div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px">
      <div style="display:flex;gap:12px">
        ${a.image_url ? `<img src="${esc(a.image_url)}" style="width:80px;height:80px;border-radius:8px;object-fit:cover">` : '<div style="width:80px;height:80px;background:var(--bg);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted)">📸</div>'}
        <div style="flex:1">
          <div style="font-weight:600">${esc(a.title)}</div>
          <div class="muted" style="font-size:.8rem;margin-bottom:6px">${esc(a.company_name || 'Unknown')}</div>
          <div class="muted" style="font-size:.8rem">${esc(a.description.substring(0, 80))}...</div>
          ${a.tags && a.tags.length ? `<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">${a.tags.map(t => `<span class="pill" style="background:var(--bg);color:var(--text)">${esc(t)}</span>`).join('')}</div>` : ''}
          <div style="margin-top:8px">
            <button onclick="showMatchingWords(${a.id})" style="background:none;border:none;color:var(--accent);cursor:pointer;text-decoration:underline;font-size:.8rem;padding:0">
              📊 View matching words
            </button>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${isPending ? `
            <button onclick="approveAd(${a.id}, true)" style="background:var(--good);color:#fff;border:none;border-radius:6px;padding:5px 12px;cursor:pointer;font-weight:700;font-size:.78rem;white-space:nowrap">Approve</button>
            <button onclick="approveAd(${a.id}, false)" style="background:var(--bad);color:#fff;border:none;border-radius:6px;padding:5px 12px;cursor:pointer;font-weight:700;font-size:.78rem;white-space:nowrap">Reject</button>
          ` : `
            <button onclick="toggleAdStatus(${a.id}, ${a.active ? 0 : 1})" style="background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;font-weight:700;font-size:.78rem;white-space:nowrap">${a.active ? 'Deactivate' : 'Activate'}</button>
          `}
        </div>
      </div>
    </div>`;

    el.innerHTML = `
      <h2>Pending Approval (${pending.length})</h2>
      ${pending.length === 0 ? '<div class="muted">No pending advertisements.</div>' : pending.map(a => adRow(a, true)).join('')}
      <h2>Approved Advertisements (${approved.length})</h2>
      ${approved.length === 0 ? '<div class="muted">No approved advertisements yet.</div>' : approved.map(a => adRow(a, false)).join('')}
    `;
  } catch (e) {
    el.innerHTML = '<div class="gate">Error loading advertisements: ' + esc(e.message) + '</div>';
  }
}

async function approveCompany(companyId, approve) {
  if (!confirm('Are you sure?')) return;
  try {
    const r = await fetch(`/api/admin/companies/${companyId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ approved: approve })
    });
    if (r.ok) loadCompanies();
    else alert('Failed to update company');
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function approveAd(adId, approve) {
  if (!confirm('Are you sure?')) return;
  try {
    const r = await fetch(`/api/admin/advertisements/${adId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ approved: approve })
    });
    if (r.ok) loadAdvertisements();
    else alert('Failed to update advertisement');
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function toggleAdStatus(adId, active) {
  try {
    const r = await fetch(`/api/admin/advertisements/${adId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ active: active })
    });
    if (r.ok) loadAdvertisements();
    else alert('Failed to update advertisement');
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function loadTokens() {
  const el = $('#tokens-content');
  el.innerHTML = '<div class="gate">Loading...</div>';
  try {
    const r = await fetch('/api/admin/tokens');
    const data = await r.json();
    const tokens = data.tokens || [];

    el.innerHTML = `
      <div style="margin-bottom:20px">
        <h2>API Tokens</h2>
        <p style="color:var(--muted);font-size:.9rem">Create tokens to authenticate API requests without logging in. Use: <code>Authorization: Bearer YOUR_TOKEN</code></p>
        <button onclick="showCreateTokenModal()" style="background:var(--accent);color:#06121f;border:none;border-radius:8px;padding:10px 16px;cursor:pointer;font-weight:700">+ Generate Token</button>
      </div>

      ${tokens.length === 0 ? '<div class="muted">No tokens created yet.</div>' : `
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:.82rem">
            <thead>
              <tr style="border-bottom:1px solid var(--border)">
                <th style="text-align:left;padding:10px;color:var(--muted)">Name</th>
                <th style="text-align:left;padding:10px;color:var(--muted)">Created</th>
                <th style="text-align:left;padding:10px;color:var(--muted)">Last Used</th>
                <th style="text-align:left;padding:10px;color:var(--muted)">Action</th>
              </tr>
            </thead>
            <tbody>
              ${tokens.map(t => `
                <tr style="border-bottom:1px solid var(--border)">
                  <td style="padding:10px">${esc(t.name || '(unnamed)')}</td>
                  <td style="padding:10px;color:var(--muted)">${fmtTime(t.created_at)}</td>
                  <td style="padding:10px;color:var(--muted)">${esc(t.last_used_at ? fmtTime(t.last_used_at) : '—')}</td>
                  <td style="padding:10px"><button onclick="revokeToken(${t.id})" style="background:rgba(239,68,68,.2);color:var(--bad);border:1px solid var(--bad);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:.78rem">Revoke</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `}
      <div id="token-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:16px">
        <div style="background:var(--panel);border:1px solid var(--border);border-radius:14px;width:100%;max-width:400px;padding:24px">
          <h2 style="margin:0 0 16px">Generate API Token</h2>
          <label style="display:block;font-size:.8rem;color:var(--muted);margin:12px 0 4px">Name (optional)</label>
          <input id="token-name" type="text" placeholder="e.g., CI/CD Pipeline" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:.95rem">
          <div id="token-error" style="color:var(--bad);font-size:.8rem;min-height:18px;margin:10px 0"></div>
          <div style="display:flex;gap:12px;margin-top:20px">
            <button onclick="closeTokenModal()" style="flex:1;background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer">Cancel</button>
            <button onclick="createToken()" style="flex:1;background:var(--accent);color:#06121f;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer">Generate</button>
          </div>
        </div>
      </div>
    `;

    document.getElementById('token-modal').style.display = 'flex';
  } catch (e) {
    el.innerHTML = '<div class="gate">Error loading tokens: ' + esc(e.message) + '</div>';
  }
}

function showCreateTokenModal() {
  const modal = $('#token-modal');
  if (modal) {
    document.getElementById('token-name').value = '';
    document.getElementById('token-error').textContent = '';
    modal.style.display = 'flex';
  }
}

function closeTokenModal() {
  const modal = $('#token-modal');
  if (modal) modal.style.display = 'none';
}

async function createToken() {
  const name = document.getElementById('token-name').value.trim() || null;
  const errEl = document.getElementById('token-error');
  errEl.textContent = '';

  try {
    const r = await fetch('/api/admin/tokens', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    if (!r.ok) throw new Error('Failed to create token');
    const data = await r.json();
    const token = data.token;

    // Show token in modal with copy button
    const modal = $('#token-modal');
    modal.innerHTML = `
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:14px;width:100%;max-width:500px;padding:24px">
        <h2 style="margin:0 0 16px;color:var(--good)">✓ Token Created!</h2>
        <p style="color:var(--muted);margin:0 0 16px">Copy this token now. You won't be able to see it again!</p>

        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:16px;display:flex;gap:8px;align-items:center">
          <input id="token-display" type="text" value="${token}" readonly style="flex:1;background:transparent;color:var(--accent);border:none;font-family:monospace;font-size:.85rem;cursor:text">
          <button onclick="copyToken()" style="background:var(--accent);color:#06121f;border:none;border-radius:6px;padding:8px 12px;cursor:pointer;font-weight:700;font-size:.8rem;white-space:nowrap">📋 Copy</button>
        </div>

        <div style="background:rgba(245,158,11,.1);border:1px solid var(--hard);border-radius:8px;padding:12px;margin-bottom:16px">
          <div style="color:var(--hard);font-size:.8rem;font-weight:600;margin-bottom:6px">⚠ Security Note</div>
          <div style="color:var(--muted);font-size:.75rem">
            • Never share this token publicly<br>
            • Store it securely (e.g., in your CI/CD secrets)<br>
            • If leaked, revoke it immediately
          </div>
        </div>

        <button onclick="closeTokenModal(); loadTokens()" style="width:100%;background:var(--accent);color:#06121f;border:none;border-radius:8px;padding:12px;font-weight:700;cursor:pointer">Done</button>
      </div>
    `;
  } catch (e) {
    errEl.textContent = 'Error: ' + e.message;
  }
}

function copyToken() {
  const input = document.getElementById('token-display');
  input.select();
  document.execCommand('copy');

  // Show feedback
  const btn = event.target;
  const originalText = btn.textContent;
  btn.textContent = '✓ Copied!';
  btn.style.background = 'var(--good)';
  setTimeout(() => {
    btn.textContent = originalText;
    btn.style.background = 'var(--accent)';
  }, 2000);
}

async function revokeToken(tokenId) {
  if (!confirm('Revoke this token? Any integrations using it will stop working.')) return;
  try {
    const r = await fetch(`/api/admin/tokens/${tokenId}`, { method: 'DELETE' });
    if (r.ok) loadTokens();
    else alert('Failed to revoke token');
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function showMatchingWords(adId) {
  try {
    const r = await fetch(`/api/admin/advertisements/${adId}/matching-words`);
    const data = await r.json();
    const words = data.words || [];
    const count = data.count || 0;

    // Create modal overlay
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px';

    const content = document.createElement('div');
    content.style.cssText = 'background:var(--panel);border:1px solid var(--border);border-radius:14px;width:100%;max-width:500px;max-height:70vh;overflow-y:auto;padding:24px';

    content.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="margin:0;font-size:1.1rem">📊 Matching Words (${count})</h2>
        <button onclick="this.closest('[role=dialog]').remove()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted)">×</button>
      </div>

      ${count === 0 ? `
        <div style="color:var(--muted);text-align:center;padding:20px">
          No words match this ad's tags yet.
        </div>
      ` : `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${words.map(w => `
            <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px">
              <div style="font-weight:600;color:var(--accent)">${esc(w.word)}</div>
              <div style="font-size:.75rem;color:var(--muted);margin-top:4px">#${w.id}</div>
            </div>
          `).join('')}
        </div>
      `}
    `;

    modal.appendChild(content);
    modal.setAttribute('role', 'dialog');
    modal.onclick = (e) => {
      if (e.target === modal) modal.remove();
    };

    document.body.appendChild(modal);
  } catch (e) {
    alert('Error loading matching words: ' + e.message);
  }
}

load();
</script>
</body>
</html>
