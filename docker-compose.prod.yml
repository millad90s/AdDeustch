services:
  web:
    build: ""
    image: ghcr.io/millad90s/addeustch:master
    container_name: flashcards
    env_file:
      - .env.prod
    ports:
      - "8080:8000"
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips", "*"]
    environment:
      BEHIND_PROXY: "true"
      DB_PATH: /data/flashcards.db
      MINIO_ENDPOINT: minio:9000
      MINIO_USE_SSL: "false"
    volumes:
      - ./data:/data
    depends_on:
      minio:
        condition: service_healthy
    restart: always

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env.prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  minio-data:
    driver: local
